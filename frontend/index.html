<!--
  React entry HTML:
  Provides a root container (#root) where the React app will be mounted.
  main.jsx loads and renders <App /> into this container.
-->

<!doctype html>
<!-- Use HTML5 standard -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo1.png" />
    <!-- Browser tab icon -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes layout responsive on mobile -->
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Load the React entry file (main.jsx) -->
  </body>
</html>
